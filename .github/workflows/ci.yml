name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Typecheck server (+ shared)
        run: npm --workspace server run typecheck
      - name: Web export builds (also generates typed routes)
        run: npm --workspace app run build:web
      - name: Typecheck app
        run: npm --workspace app run typecheck
